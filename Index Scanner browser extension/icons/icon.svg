<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="800" height="800" fill="#0b0f0c"/>

  <!-- Subtle hex grid (left ~20%) -->
  <defs>
    <pattern id="hex" width="36" height="31" patternUnits="userSpaceOnUse">
      <path d="M18 0 L36 9 L36 27 L18 36 L0 27 L0 9 Z" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>

    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="180" height="800" fill="url(#hex)" opacity="0.25"/>

  <!-- Circuit lines (right side) -->
  <g stroke="#1a1a1a" stroke-width="2" opacity="0.25" fill="none">
    <path d="M600 150 H750 M750 150 V200"/>
    <circle cx="750" cy="200" r="4" fill="#1a1a1a"/>
    <path d="M580 260 H720 M720 260 V310"/>
    <circle cx="720" cy="310" r="4" fill="#1a1a1a"/>
  </g>

  <!-- Centered ICON -->
  <g transform="translate(400,400)" stroke="#00FF41" stroke-width="6" fill="none" filter="url(#glow)" stroke-linecap="round" stroke-linejoin="round">

    <!-- Shield (closer to original proportions) -->
    <path d="M-90 -70 L0 -105 L90 -70 L90 20 C90 85 0 125 0 125 C0 125 -90 85 -90 20 Z"/>

    <!-- H (thicker like original) -->
    <line x1="-40" y1="-40" x2="-40" y2="50"/>
    <line x1="40" y1="-40" x2="40" y2="50"/>
    <line x1="-40" y1="5" x2="40" y2="5"/>

    <!-- Circuit nodes (left, same style) -->
    <circle cx="-90" cy="10" r="5" fill="#00FF41"/>
    <circle cx="-115" cy="35" r="5" fill="#00FF41"/>
    <circle cx="-90" cy="60" r="5" fill="#00FF41"/>

    <path d="M-90 10 L-40 5"/>
    <path d="M-115 35 L-40 5"/>
    <path d="M-90 60 L-40 5"/>

    <!-- Magnifying glass (same overlap feel) -->
    <circle cx="35" cy="10" r="55"/>
    <line x1="70" y1="50" x2="110" y2="90"/>

  </g>

</svg>
